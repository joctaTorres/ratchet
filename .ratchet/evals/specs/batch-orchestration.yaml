changes/batch-orchestration/features/batch-manifest/dag-edges#serial-execution-is-a-chain-of-after-edges:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      mkdir -p .ratchet/batches/serial
      printf '%s\n' \
        'name: serial' \
        'phases:' \
        '  - name: foundation' \
        '    goal: g' \
        '    success: s' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: a' \
        '        done: a is done' \
        '      - name: b' \
        '        after: [a]' \
        '        done: b is done' > .ratchet/batches/serial/batch.yaml
      # A chain of `after` edges serializes: only the head is ready, the tail is
      # blocked by its predecessor, and `next` is the head.
      ratchet validate serial | grep -q "valid"
      ratchet batch status serial --json > /tmp/serial.json
      q() { python3 -c "import json;c={x['name']:x for x in json.load(open('/tmp/serial.json'))['phases'][0]['changes']};d=json.load(open('/tmp/serial.json'));print($1)"; }
      test "$(q "c['a']['status']")" = "ready"
      test "$(q "c['b']['status']")" = "blocked"
      test "$(q "','.join(c['b']['blockedBy'])")" = "a"
      test "$(q "d['next']['change']")" = "a"

changes/batch-orchestration/features/batch-manifest/dag-edges#parallel-execution-is-the-absence-of-edges:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      mkdir -p .ratchet/batches/par
      printf '%s\n' \
        'name: par' \
        'phases:' \
        '  - name: foundation' \
        '    goal: g' \
        '    success: s' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: a' \
        '        done: a is done' \
        '      - name: b' \
        '        done: b is done' > .ratchet/batches/par/batch.yaml
      # No edges => both changes are independently ready (parallel), neither blocked.
      ratchet validate par | grep -q "valid"
      ratchet batch status par --json > /tmp/par.json
      q() { python3 -c "import json;c={x['name']:x for x in json.load(open('/tmp/par.json'))['phases'][0]['changes']};print($1)"; }
      test "$(q "c['a']['status']")" = "ready"
      test "$(q "c['b']['status']")" = "ready"
      test "$(q "len(c['a']['blockedBy'])+len(c['b']['blockedBy'])")" = "0"

# ─────────────────────────── batch-config ───────────────────────────────────

changes/batch-orchestration/features/batch-config/config#sensible-defaults-when-no-batch-section-is-present:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # config.yaml carries no `batch:` section: the resolved settings are the
      # hard-coded defaults, sourced as `default`.
      ratchet batch config --json > /tmp/cfg.json
      f() { python3 -c "import json;print(json.load(open('/tmp/cfg.json'))$1)"; }
      test "$(f "['settings']['gate']")" = "voluntary"
      test "$(f "['settings']['strategy']")" = "vertical-slice"
      test "$(f "['settings']['proofOfWork']")" = "hard-gate"
      test "$(f "['sources']['gate']")" = "default"

changes/batch-orchestration/features/batch-config/config#defaults-are-loaded-from-the-project-config:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # Writing the project-level batch section makes it the source of the value.
      ratchet batch config --set gate=every-phase >/dev/null
      grep -q "every-phase" .ratchet/config.yaml
      ratchet batch config --json > /tmp/cfg.json
      f() { python3 -c "import json;print(json.load(open('/tmp/cfg.json'))$1)"; }
      test "$(f "['settings']['gate']")" = "every-phase"
      test "$(f "['sources']['gate']")" = "project"

changes/batch-orchestration/features/batch-config/config#a-batch-manifest-overrides-project-defaults:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # Project gate is voluntary (default); the manifest pins after-propose.
      mkdir -p .ratchet/batches/q3-auth
      printf '%s\n' \
        'name: q3-auth' \
        'settings:' \
        '  gate: after-propose' \
        'phases:' \
        '  - name: foundation' \
        '    goal: g' \
        '    success: s' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: a' \
        '        done: a is done' > .ratchet/batches/q3-auth/batch.yaml
      ratchet batch config q3-auth --json > /tmp/cfg.json
      f() { python3 -c "import json;print(json.load(open('/tmp/cfg.json'))$1)"; }
      test "$(f "['settings']['gate']")" = "after-propose"
      test "$(f "['sources']['gate']")" = "manifest"

changes/batch-orchestration/features/batch-config/config#reading-effective-settings-for-a-specific-batch:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # Project sets strategy=feature; the named batch inherits it (no manifest
      # override) and the effective read names the batch and its sources.
      ratchet batch config --set strategy=feature >/dev/null
      mkdir -p .ratchet/batches/q3-auth
      printf '%s\n' \
        'name: q3-auth' \
        'phases:' \
        '  - name: foundation' \
        '    goal: g' \
        '    success: s' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: a' \
        '        done: a is done' > .ratchet/batches/q3-auth/batch.yaml
      ratchet batch config q3-auth --json > /tmp/cfg.json
      f() { python3 -c "import json;print(json.load(open('/tmp/cfg.json'))$1)"; }
      test "$(f "['name']")" = "q3-auth"
      test "$(f "['settings']['strategy']")" = "feature"
      test "$(f "['sources']['strategy']")" = "project"

changes/batch-orchestration/features/batch-config/config#the-gate-policy-is-a-dial:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # The gate is a dial across its full enum: each allowed value is accepted
      # and read back.
      for g in voluntary after-propose every-phase autonomous; do
        ratchet batch config --set "gate=$g" >/dev/null
        got="$(ratchet batch config --json | python3 -c 'import json,sys;print(json.load(sys.stdin)["settings"]["gate"])')"
        test "$got" = "$g" || { echo "gate dial failed at $g (got $got)" >&2; exit 1; }
      done

changes/batch-orchestration/features/batch-config/config#invalid-setting-values-are-rejected:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      before="$(cat .ratchet/config.yaml)"
      # An out-of-enum gate value is rejected, listing the allowed values, and
      # the config file is left untouched.
      if ratchet batch config --set gate=whenever >/tmp/cfg.out 2>&1; then
        echo "expected an invalid gate value to be rejected" >&2
        exit 1
      fi
      grep -q "voluntary" /tmp/cfg.out
      after="$(cat .ratchet/config.yaml)"
      test "$before" = "$after"

