      test ! -e ".ratchet/batches/Bad Name!"

changes/batch-orchestration/features/batch-manifest/create-batch#a-batch-references-changes-by-name-without-owning-them:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      ratchet new batch q3-auth >/dev/null
      # The manifest references a change by name; no change directory is created
      # by scaffolding the batch — the batch does not own the change.
      grep -q "name: add-first-change" .ratchet/batches/q3-auth/batch.yaml
      test ! -e .ratchet/changes/add-first-change
      # Status surfaces the referenced change as pending (exists=false), not an error.
      exists="$(ratchet batch status q3-auth --json | python3 -c 'import json,sys;d=json.load(sys.stdin);print(d["phases"][0]["changes"][0]["exists"])')"
      test "$exists" = "False"

