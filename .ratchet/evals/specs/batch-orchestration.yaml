        '  - name: foundation' \
        '    goal: g' \
        '    success: s' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: a' \
        '        after: [b]' \
        '        done: a is done' \
        '      - name: b' \
        '        after: [a]' \
        '        done: b is done' > .ratchet/batches/cyclic/batch.yaml
