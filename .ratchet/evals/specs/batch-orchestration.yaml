changes/batch-orchestration/features/batch-view/rich-view#view-respects-no-color:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      ratchet new batch q3-auth >/dev/null
      out="$(ratchet --no-color batch view q3-auth)"
      # Under --no-color no ANSI escape codes are emitted: the CSI byte must be
      # absent from the output.
      printf '%s' "$out" > /tmp/view.out
      python3 -c "assert '\x1b[' not in open('/tmp/view.out').read(), 'ANSI escape under --no-color'"

# ---------------------------------------------------------------------------
# Recovered cases (added in a second pass): the `ratchet batch report` CLI
# channel and the manifest/validate/config-level phase scenarios are all
# deterministically checkable without a live coding agent. Cases that genuinely
# require an agent or the deferred proof-of-work host loop remain unbound.
# ---------------------------------------------------------------------------

changes/batch-orchestration/features/batch-report/report#a-propose-agent-voluntarily-halts-for-alignment:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # Default resolved gate is "voluntary"; a propose agent raises a blocker.
      ratchet new batch demo >/dev/null
      printf '%s\n' \
        'name: demo' \
        'phases:' \
        '  - name: foundation' \
        '    goal: stand up the API' \
        '    success: endpoint responds' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: add-login-api' \
        '        done: the login endpoint responds' > .ratchet/batches/demo/batch.yaml
      ratchet batch report demo --change add-login-api --blocker 'cookie or header sessions? changes the whole API surface' >/dev/null
      # The step is parked as blocked with that question and is NOT advanced.
      ratchet batch status demo --json | python3 -c "import sys,json; d=json.load(sys.stdin); c=[x for p in d['phases'] for x in p['changes'] if x['name']=='add-login-api'][0]; assert c['status']=='blocked', c; assert c['parked']['kind']=='blocked', c; assert 'cookie or header sessions' in c['parked']['reason'], c"
      # The question surfaces in the batch view.
      ratchet --no-color batch view demo | grep -q 'cookie or header sessions'

changes/batch-orchestration/features/batch-report/report#an-agent-signals-it-produced-a-proposal-awaiting-approval:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      ratchet new batch demo >/dev/null
      printf '%s\n' \
        'name: demo' \
        'phases:' \
        '  - name: foundation' \
        '    goal: stand up the API' \
        '    success: endpoint responds' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: add-login-api' \
        '        done: the login endpoint responds' > .ratchet/batches/demo/batch.yaml
      # Given the resolved gate is "after-propose".
      ratchet batch config demo --set gate=after-propose >/dev/null
      ratchet batch report demo --change add-login-api --complete 'proposal ready' --awaiting-approval >/dev/null
      # The step is parked as awaiting-approval.
      ratchet batch status demo --json | python3 -c "import sys,json; d=json.load(sys.stdin); c=[x for p in d['phases'] for x in p['changes'] if x['name']=='add-login-api'][0]; assert c['awaitingApproval'] is True, c; assert c['parked']['kind']=='awaiting-approval', c"
      # The user can approve or reject-with-feedback from the batch view.
      out="$(ratchet --no-color batch view demo)"
      echo "$out" | grep -qi 'awaiting approval'
      echo "$out" | grep -qi 'approve or reject'

changes/batch-orchestration/features/batch-report/report#the-report-channel-works-for-any-agent-that-can-run-a-shell-command:
