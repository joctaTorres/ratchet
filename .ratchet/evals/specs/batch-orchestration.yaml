      c() { python3 -c "import json;m={x['name']:x for x in json.load(open('/tmp/st.json'))['phases'][0]['changes']};print(m$1)"; }
      test "$(c "['done-change']['status']")" = "done"
      test "$(c "['done-change']['progress']['completed']")" = "2"
      test "$(c "['done-change']['progress']['total']")" = "2"

changes/batch-orchestration/features/batch-status/derived-status#a-change-with-partial-task-progress-is-in-progress:
