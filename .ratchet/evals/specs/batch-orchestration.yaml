changes/batch-orchestration/features/batch-phases/phases#a-phase-declares-a-goal-success-criteria-and-a-proof-of-work:
  fixture: batch-states
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # The full manifest (goal + success + proofOfWork{kind,run,pass}) is valid.
      ratchet validate states >/dev/null
      # The phase exposes a human-readable goal and success criteria.
      ratchet batch status states --json | python3 -c "import sys,json; p=json.load(sys.stdin)['phases'][0]; assert p['goal'].strip(), p; assert p['success'].strip(), p"
      # Proof-of-work is a declared, required part of a phase: dropping it, or
      # omitting its run command, makes the manifest invalid.
      mkdir -p .ratchet/batches/nopow
      printf '%s\n' 'name: nopow' 'phases:' '  - name: foundation' '    goal: g' '    success: s' '    changes: []' > .ratchet/batches/nopow/batch.yaml
      ratchet validate nopow 2>&1 | grep -qi 'proofOfWork'
      mkdir -p .ratchet/batches/badpow
      printf '%s\n' 'name: badpow' 'phases:' '  - name: foundation' '    goal: g' '    success: s' '    proofOfWork: { kind: integration, pass: "exit 0" }' '    changes: []' > .ratchet/batches/badpow/batch.yaml
      ratchet validate badpow 2>&1 | grep -qi 'proofofwork.run'

changes/batch-orchestration/features/batch-phases/phases#proof-of-work-kinds-are-constrained-to-executable-checks:
  fixture: batch-base
