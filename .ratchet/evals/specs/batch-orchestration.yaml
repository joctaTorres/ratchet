# Eval-spec bindings for the batch-orchestration change.
#
# Every bound case is a deterministic `check`: the `run` script performs the
# real `ratchet` invocation(s) inside a fresh throwaway copy of the named
# fixture and then asserts the scenario's Then post-condition, exiting non-zero
# on any mismatch (`set -e`, `test`, `grep -q`, `|| exit 1`). `pass: exit-zero`
# is therefore sound: the script itself proves the outcome.
#
# Fixtures (checked-in under ../fixtures/), each a self-contained ratchet
# project with a nested .ratchet/:
#   batch-base    minimal project (config.yaml `schema: ratchet`, empty
#                 changes/). Checks scaffold batches / hand-write manifests /
#                 set config at runtime, mutating their own throwaway copy.
#   batch-states  a `states` batch whose manifest references four changes in
#                 every derived state: done-change (all tasks [x]), wip-change
#                 (partial), pending-change (no dir), arch-change (archived).
#   batch-apply   a `q3-auth` batch with one ready change (add-login-api) plus a
#                 checked-in scripted agent (agent.sh / agent-blocker.sh). Checks
#                 export RATCHET_BATCH_AGENT_CMD=<that script> so `ratchet batch
#                 apply` drives a real, deterministic propose/apply transition
#                 without spawning a live LLM (see the batch-agent-stub-seam
#                 change: the engine runs the override via `bash -c`, feeding the
#                 step instructions on stdin, instead of resolving an adapter).
#
# Intentionally UNBOUND (remain `unjudged`, never passed):
#   * engine-interface/* and the batch-apply "engine installed and licensed" /
#     "/rct:batch skill" scenarios — licensing was dropped and the engine is
#     bundled MIT; those scenarios are stale vs current behavior.
#   * batch-apply#the-transition-sequence-per-change-is-propose-then-apply-then-
#     verify — the propose and apply transitions are now driveable via the stub
#     (see below), but the *verify* leg is part of the DEFERRED HOST LOOP: once a
#     change's plan tasks are all checked it is `done`, and `batch apply`'s
#     step-picker treats done as terminal (it never re-selects the change to run
#     the verify transition the engine's computeNextTransition would otherwise
#     return). Binding this case would require the not-yet-wired host loop, so it
#     stays unjudged with the proof-of-work gating below.
#   * batch-phases/phases proof-of-work gating cases (a failing proof-of-work
#     hard-gates / a later phase blocked until the prior phase proof-of-work
#     passes / enforcement relaxed to warn) — `runProofOfWork` is deliberately
#     NOT wired into runStep/apply yet; this is the same deferred host-loop gap.
#   * remaining batch-report/* halts that depend on agent-produced halts beyond
#     the scripted stub.

# ─────────────────────────── batch-template ───────────────────────────

changes/batch-orchestration/features/batch-template/batch-template#print-the-canonical-batch-template:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      out="$(ratchet template batch)"
      # The canonical template prints the phase/DAG skeleton, not a scaffolded
      # instance: it carries the placeholder name and the `after` edge syntax.
      echo "$out" | grep -q "phases:"
      echo "$out" | grep -q "name: example-batch"
      echo "$out" | grep -q "after"
      echo "$out" | grep -q "proofOfWork"

changes/batch-orchestration/features/batch-template/batch-template#scaffolded-batches-start-from-the-template:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      ratchet new batch q3-auth >/dev/null
      manifest=".ratchet/batches/q3-auth/batch.yaml"
      test -f "$manifest"
      # The scaffold is the template specialized to this batch: its own name, a
      # real dated `created:`, and the same phases/proofOfWork skeleton.
      grep -q "name: q3-auth" "$manifest"
      grep -Eq "created: [0-9]{4}-[0-9]{2}-[0-9]{2}" "$manifest"
      grep -q "phases:" "$manifest"
      grep -q "proofOfWork" "$manifest"

changes/batch-orchestration/features/batch-template/batch-template#validating-a-batch-manifest:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      ratchet new batch q3-auth >/dev/null
      out="$(ratchet validate q3-auth)"
      echo "$out" | grep -q "valid"
      # A manifest with a malformed proof-of-work kind is rejected, naming the
      # offending field, with a non-zero exit.
      mkdir -p .ratchet/batches/badkind
      printf '%s\n' \
        'name: badkind' \
        'phases:' \
        '  - name: foundation' \
        '    goal: g' \
        '    success: s' \
        '    proofOfWork:' \
        '      kind: not-a-kind' \
        '      run: x' \
        '      pass: "0"' \
        '    changes:' \
        '      - name: ok-change' \
        '        done: ok-change is done' > .ratchet/batches/badkind/batch.yaml
      if ratchet validate badkind >/tmp/bk.out 2>&1; then
        echo "expected validate to fail on a bad proofOfWork kind" >&2
        exit 1
      fi
      grep -q "proofOfWork" /tmp/bk.out

changes/batch-orchestration/features/batch-template/batch-template#a-hand-edited-manifest-is-a-first-class-manifest:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # A manifest written entirely by hand (never scaffolded) is read,
      # validated, and status-derived exactly like a generated one.
      mkdir -p .ratchet/batches/by-hand
      printf '%s\n' \
        'name: by-hand' \
        'phases:' \
        '  - name: foundation' \
        '    goal: g' \
        '    success: s' \
        '    proofOfWork: { kind: integration, run: x, pass: "exit 0" }' \
        '    changes:' \
        '      - name: a' \
        '        done: a is done' \
        '      - name: b' \
        '        after: [a]' \
        '        done: b is done' > .ratchet/batches/by-hand/batch.yaml
      ratchet validate by-hand | grep -q "valid"
      name="$(ratchet batch status by-hand --json | python3 -c 'import json,sys;print(json.load(sys.stdin)["name"])')"
      test "$name" = "by-hand"

