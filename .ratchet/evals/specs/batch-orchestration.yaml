changes/batch-orchestration/features/batch-status/derived-status#a-manifest-intent-with-no-change-directory-yet-is-pending:
  fixture: batch-states
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # The intent references a change with no directory; this is not an error
      # (status exits 0) and the change is reported as not-yet-existing.
      ratchet batch status states --json > /tmp/st.json
      c() { python3 -c "import json;m={x['name']:x for x in json.load(open('/tmp/st.json'))['phases'][0]['changes']};print(m$1)"; }
      test "$(c "['pending-change']['exists']")" = "False"
      test "$(c "['pending-change']['archived']")" = "False"
      test "$(c "['pending-change']['progress']['total']")" = "0"
      test ! -e .ratchet/changes/pending-change

changes/batch-orchestration/features/batch-status/derived-status#an-archived-change-counts-as-done:
  fixture: batch-states
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      ratchet batch status states --json > /tmp/st.json
      c() { python3 -c "import json;m={x['name']:x for x in json.load(open('/tmp/st.json'))['phases'][0]['changes']};print(m$1)"; }
      test "$(c "['arch-change']['status']")" = "done"
      test "$(c "['arch-change']['archived']")" = "True"
      test -d .ratchet/changes/archive/arch-change

changes/batch-orchestration/features/batch-status/derived-status#machine-readable-status-for-agents-and-the-engine:
  fixture: batch-states
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      # `--json` is valid, machine-readable, and carries the contract fields an
      # agent/engine consume: name, phases[].changes[] with per-change status,
      # and the next-actionable pointer.
      ratchet batch status states --json > /tmp/st.json
      f() { python3 -c "import json;print(json.load(open('/tmp/st.json'))$1)"; }
      test "$(f "['name']")" = "states"
      test "$(f "[ 'phases' ][0]['changes'][0]['name']")" = "done-change"
      test "$(f "[ 'phases' ][0]['changes'][0]['status']")" = "done"
      # The next-actionable pointer is part of the contract (may be a dict or null).
      python3 -c "import json;d=json.load(open('/tmp/st.json'));assert 'next' in d"

# ─────────────────────────── batch-view / rich-view ─────────────────────────

changes/batch-orchestration/features/batch-view/rich-view#list-all-batches:
  fixture: batch-base
  kind: check
  check:
    pass: exit-zero
    run: |
      set -e
      ratchet new batch alpha >/dev/null
      ratchet new batch beta >/dev/null
      # The list surfaces every batch by name (machine-readable form is exact).
      ratchet batch list --json > /tmp/list.json
      names="$(python3 -c "import json;print(' '.join(b['name'] for b in json.load(open('/tmp/list.json'))['batches']))")"
      echo "$names" | grep -q "alpha"
      echo "$names" | grep -q "beta"
