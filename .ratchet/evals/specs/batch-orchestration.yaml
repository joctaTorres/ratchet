    pass: exit-zero
    run: |
      set -e
      ratchet new batch demo >/dev/null
      # Each executable kind is accepted.
      for k in integration blackbox llm-judge; do
        printf '%s\n' 'name: demo' 'phases:' '  - name: p' '    goal: g' '    success: s' "    proofOfWork: { kind: $k, run: x, pass: \"exit 0\" }" '    changes: []' > .ratchet/batches/demo/batch.yaml
        ratchet validate demo >/dev/null
      done
      # A non-executable / unknown kind is rejected, naming the allowed set.
      printf '%s\n' 'name: demo' 'phases:' '  - name: p' '    goal: g' '    success: s' '    proofOfWork: { kind: manual-review, run: x, pass: "exit 0" }' '    changes: []' > .ratchet/batches/demo/batch.yaml
      ratchet validate demo 2>&1 | grep -qi 'integration, blackbox, llm-judge'

