name: ratchet
version: 1
description: Default ratchet workflow - features (Gherkin) → plan
artifacts:
  - id: features
    generates: "features/**/*.feature"
    description: Executable Gherkin feature files describing desired behavior
    template: feature.feature
    instruction: |
      Create executable Gherkin feature files that describe WHAT the system
      should do, expressed as behavior the implementation must satisfy.

      File layout (IMPORTANT):
      - `generates` is a glob, so you choose the file names.
      - Group features by capability: create one file per scenario set at
        `features/<capability>/<name>.feature`.
      - Use kebab-case for `<capability>` and `<name>` (e.g.
        `features/user-auth/login.feature`, `features/data-export/csv.feature`).
      - A capability is just the first path segment under `features/`; it groups
        related feature files together.

      Each `.feature` file MUST contain:
      - A single `Feature:` line naming the capability or behavior.
      - An optional short description block under the Feature line (the
        "In order to / As a / I want" or free-form narrative).
      - One or more `Scenario:` (or `Scenario Outline:`) blocks.

      Each Scenario MUST express behavior with Given/When/Then steps:
      - `Given` establishes context / preconditions.
      - `When` performs the action under test.
      - `Then` asserts the observable outcome.
      - Use `And` / `But` to chain additional steps of the previous kind.
      - Every Scenario MUST include at least one Given, one When, and one Then.

      Use `Scenario Outline:` with an `Examples:` table when the same behavior
      is exercised across multiple data rows. Use `Background:` for steps shared
      by every scenario in the file.

      Example:
      ```gherkin
      Feature: User login
        As a registered user
        I want to sign in
        So that I can access my account

        Scenario: Successful login with valid credentials
          Given a registered user "alice"
          When she submits her correct password
          Then she is granted an authenticated session
      ```

      Features are the contract: each Scenario is a verifiable behavior the
      implementation must satisfy.
    requires: []

  - id: plan
    generates: plan.md
    description: Implementation plan covering why, what, design, and tasks
    template: plan.md
    instruction: |
      Create the implementation plan that captures WHY this change is needed,
      WHAT changes, HOW it will be built, and the trackable task list.

      Use these sections (`##` headers), in order:
      - **## Why**: 1-3 sentences on the problem or opportunity. What problem
        does this solve? Why now?
      - **## What Changes**: Bullet list of changes. Be specific about new
        capabilities, modifications, or removals. Mark breaking changes with
        **BREAKING**. Reference the feature files this plan implements.
      - **## Design**: Key technical decisions and approach - architecture,
        data model, dependencies, trade-offs, and any migration concerns.
        Explain the "why" behind the technical choices.
      - **## Tasks**: A checklist that breaks the work into trackable items.
        The apply phase parses this section to track progress, so follow the
        format exactly.

      Task format (CRITICAL - the apply phase parses these checkboxes):
      - Group related tasks under numbered `##`/bullet headings.
      - Each task MUST be a checkbox: `- [ ] N.M Task description`.
      - Tasks not using `- [ ]` will not be tracked.
      - Order tasks by dependency (what must be done first?).

      Example:
      ```
      ## Tasks

      - [ ] 1.1 Implement the login form component
      - [ ] 1.2 Wire the authentication endpoint
      - [ ] 2.1 Add session persistence
      ```

      Reference the feature files for the behavior that must be satisfied.
      Each task should be verifiable - you know when it is done.
    requires:
      - features

apply:
  requires: [plan]
  tracks: plan.md
  instruction: |
    Read the feature files and the plan, implement against each Scenario's
    Given/When/Then, and work through the pending tasks in plan.md, marking
    them complete as you go. Pause if you hit blockers or need clarification.
